<!DOCTYPE html>
<html>
<head>
  <title>My AI Book App</title>

 <style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
  padding: 20px;
  color: #fff;
}

/* MAIN CONTAINER */
.container {
  max-width: 720px;
  margin: auto;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease-in-out;
}

/* TITLE */
h1 {
  text-align: center;
  font-size: 30px;
  margin-bottom: 20px;
  color: #ffffff;
  letter-spacing: 1px;
}

/* SECTION */
.section {
  margin-top: 25px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  transition: all 0.3s ease;
}

.section:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

/* HEADINGS */
h2 {
  margin-bottom: 12px;
  border-left: 4px solid #00f2fe;
  padding-left: 10px;
  font-size: 18px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.12);
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

input::placeholder {
  color: #ccc;
}

input:focus {
  border: 1px solid #00f2fe;
  box-shadow: 0 0 10px #00f2fe;
  background: rgba(255,255,255,0.18);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #00f2fe, #4facfe);
  color: black;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.06);
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* BOOK LIST */
ul {
  padding: 0;
}

li {
  list-style: none;
  background: rgba(255,255,255,0.1);
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  transition: all 0.3s ease;
  font-size: 14px;
}

li:hover {
  background: rgba(0,242,254,0.2);
  transform: translateX(6px);
  cursor: pointer;
}

/* RESULT BOX */
#summaryResult, #ragAnswer, #recResult {
  margin-top: 12px;
  padding: 14px;
  background: rgba(0, 242, 254, 0.15);
  border-left: 5px solid #00f2fe;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.5;
}

/* LOADING EFFECT (OPTIONAL) */
.loading {
  color: #00f2fe;
  font-weight: bold;
  animation: blink 1s infinite;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes blink {
  50% {
    opacity: 0.5;
  }
}

/* SCROLL */
html {
  scroll-behavior: smooth;
}

</style>
</head>

<body>

<div class="container">

  <h1> 🚀 AI Book Intelligence App</h1>

  <!-- BOOK LIST -->
  <div class="section">
    <h2>Books List</h2>
    <button onclick="loadBooks()">Load Books</button>
    <ul id="bookList"></ul>
  </div>

  <!-- ADD BOOK -->
  <div class="section">
    <h2>Add Book</h2>

    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input id="description" placeholder="Description">
    <input id="rating" placeholder="Rating">

    <button onclick="addBook()">Add Book</button>
  </div>

  <!-- AI SUMMARY -->
  <div class="section">
    <h2>Ask AI Summary</h2>

    <input id="aiText" placeholder="Enter book text">
    <button onclick="getSummary()">Get Summary</button>

    <p id="summaryResult"></p>
  </div>
  <div class="section">
  <h2>Book Recommendation</h2>

  <input id="recText" placeholder="Enter book name">
  <button onclick="getRecommendation()">Recommend</button>

  <p id="recResult"></p>
</div>
<div class="section">
  <h2>Ask RAG Question</h2>

  <input id="ragQuestion" placeholder="Ask something...">
  <button onclick="askRAG()">Ask</button>

  <p id="ragAnswer"></p>
</div>

</div>

<script>

// Load books
async function loadBooks() {
  let res = await fetch("http://127.0.0.1:8000/api/books/");
  let data = await res.json();

  let list = document.getElementById("bookList");
  list.innerHTML = "";

  data.forEach(book => {
    let li = document.createElement("li");
    li.innerText = book.title + " - " + book.author;
    list.appendChild(li);
  });
}

// Add book
async function addBook() {
  let title = document.getElementById("title").value;
  let author = document.getElementById("author").value;
  let description = document.getElementById("description").value;
  let rating = document.getElementById("rating").value;

  await fetch("http://127.0.0.1:8000/api/books/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, author, description, rating })
  });

  alert("Book Added 🔥");
  loadBooks();
  document.getElementById("title").value = "";
document.getElementById("author").value = "";
document.getElementById("description").value = "";
document.getElementById("rating").value = "";
}

// AI Summary
async function getSummary() {
  let text = document.getElementById("aiText").value;

  let res = await fetch("http://127.0.0.1:8000/api/ai-summary/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  let data = await res.json();

  document.getElementById("summaryResult").innerText = data.summary;
  document.getElementById("summaryResult").innerText = "Thinking... 🤖";
}
async function getRecommendation() {
  let text = document.getElementById("recText").value;

  let res = await fetch("http://127.0.0.1:8000/api/recommend/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  let data = await res.json();

  document.getElementById("recResult").innerText = data.recommendation;
  document.getElementById("recResult").innerText = "Thinking... 🤖";
}
async function askRAG() {
  let question = document.getElementById("ragQuestion").value;
  let output = document.getElementById("ragAnswer");

  output.innerText = "Thinking... 🤖";

  try {
    let res = await fetch("http://127.0.0.1:8000/api/rag/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: question })
    });

    if (!res.ok) {
      throw new Error("Server error");
    }

    let data = await res.json();

    console.log(data);

    output.innerText = data.answer || "Kuch reply nahi aaya";

  } catch (error) {
    console.error(error);
    output.innerText = "Error aa gaya bhai 💀";
  }


  document.getElementById("ragAnswer").innerText = data.answer;
  document.getElementById("ragAnswer").innerText = "Thinking... 🤖";
}
async function askRAG() {
  let question = document.getElementById("ragQuestion").value;

  let res = await fetch("http://127.0.0.1:8000/api/rag/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ question })
  });

  let data = await res.json();

  document.getElementById("ragAnswer").innerText = data.answer;
  document.getElementById("ragAnswer").innerText = "Thinking... 🤖";
}


async function askRAG() {
  console.log("Function chal raha hai 🔥");

  let question = document.getElementById("ragQuestion").value;
  let output = document.getElementById("ragAnswer");

  output.innerText = "Thinking... 🤖";

  try {
    let res = await fetch("http://127.0.0.1:8000/api/rag/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: question })
    });

    let data = await res.json();

    console.log(data);

    output.innerText = data.answer;

  } catch (error) {
    console.error(error);
    output.innerText = "Error aa gaya 💀";
  }
}


</script>

</body>
</html>
